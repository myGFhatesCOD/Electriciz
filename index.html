<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electriciz</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.1.2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <header class="bg-blue-500 text-white p-6 text-center">
        <h1 class="text-4xl font-bold">Welcome to Electriciz</h1>
    </header>
    <section class="py-12 px-4">
        <div class="container mx-auto">
            <h2 class="text-2xl font-bold text-center mb-4">Services</h2>
            <p class="text-center text-lg">Get a 30% discount on all repairs!</p>
        </div>
    </section>
    <section class="py-12 px-4">
        <div class="container mx-auto">
            <h2 class="text-2xl font-bold text-center mb-4">Submit a Repair Request</h2>
            <form action="#" method="POST" class="max-w-md mx-auto">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="deviceType">Device Type</label>
                    <input type="text" id="deviceType" name="deviceType" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="issueDescription">Issue Description</label>
                    <textarea id="issueDescription" name="issueDescription" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="photo">Upload a Photo</label>
                    <input type="file" id="photo" name="photo" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="budget">Budget Range</label>
                    <input type="text" id="budget" name="budget" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="urgency">Urgency Level</label>
                    <input type="text" id="urgency" name="urgency" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"/>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Payment Methods:</label>
                    <ul>
                        <li>CashApp</li>
                        <li>Bitcoin</li>
                        <li>Ethereum</li>
                    </ul>
                </div>
                <button type="submit" class="bg-blue-500 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Submit</button>
            </form>
        </div>
    </section>
    <footer class="bg-blue-500 text-white text-center p-4">
        <p>For trade-in information, please contact us!</p>
    </footer>
</body>
</html>
