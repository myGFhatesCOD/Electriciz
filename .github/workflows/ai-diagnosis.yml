name: Analyze Repair Requests

on:
  push:
    branches:
      - main

jobs:
  analyze_requests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run analysis
        run: |
          python analyze_repair_requests.py

      - name: Post quotes
        run: |
          # Assuming 'post_quotes.py' handles posting quotes
          python post_quotes.py
